defaults:
  - env: dmc_vision
  - model: size12M
  # Disable Hydra's Python logging-to-file (train.log)
  - override hydra/job_logging: disabled
  - _self_

logdir: logdir/${now:%Y-%m-%d}/${now:%H-%M-%S}
seed: 0
deterministic_run: False
device: 'cuda:0'

hydra:
  run:
    dir: ${logdir}

batch_size: 16
batch_length: 64

buffer:
  batch_size: ${batch_size}
  batch_length: ${batch_length}
  max_size: 5e5
  device: ${device}
  storage_device: 'cuda:0'
  prioritized: False
  priority_alpha: 0.6
  priority_beta: 0.4
  priority_eps: 1e-6
  priority_reduction: max

trainer:
  steps: ${env.steps}
  pretrain: 0
  eval_every: 1e4
  save_every: 3000
  eval_episode_num: ${env.eval_episode_num}
  sample_eval_episode_num: 5
  eval_gap_checkpoint_threshold: 100.0
  eval_drop_checkpoint_ratio: 0.5
  eval_drop_checkpoint_sample_ratio: 0.75
  batch_size: ${batch_size}
  batch_length: ${batch_length}
  train_ratio: ${env.train_ratio}
  video_pred_log: False
  params_hist_log: False
  update_log_every: 5e3
  action_repeat: ${env.action_repeat}
