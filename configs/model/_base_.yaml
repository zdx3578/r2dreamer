act_entropy: 3e-4
kl_free: 1.0
imag_horizon: 15
horizon: 333
lamb: 0.95
compile: True
log_grads: False
device: ${device}
rep_loss: "r2dreamer" # r2dreamer/dreamer/infonce/dreamerpro
use_structured_readout: False
use_effect_model: False
use_goal_progress_head: False
use_reachability_head: False
use_objectification: False
use_operator_bank: False
use_binding_head: False
use_signature_head: False
use_rule_update: False
use_event_pipeline: False
use_sl_gate: False

lr: 4e-5
agc: 0.3
pmin: 1e-3
eps: 1e-20
beta1: 0.9
beta2: 0.999
warmup: 1000
slow_target_update: 1
slow_target_fraction: 0.02

loss_scales:
  barlow: 0.05
  infonce: 1.0
  recon: 1.0
  rew: 1.0
  con: 1.0
  dyn: 1.0
  rep: 0.1
  policy: 1.0
  value: 1.0
  repval: 0.3
  swav: 1.0
  temp: 1.0
  norm: 1.0
  struct_map: 0.2
  struct_obj: 0.2
  struct_global: 0.2
  delta_map: 1.0
  delta_obj: 1.0
  delta_global: 1.0
  event: 0.5
  reach: 0.25
  goal: 0.25
  obj_stable: 0.25
  obj_local: 0.25
  obj_rel: 0.25
  op_assign: 0.1
  op_proto: 0.1
  op_reuse: 0.05
  bind_ce: 0.05
  bind_consistency: 0.05
  sig_scope: 0.05
  sig_duration: 0.05
  sig_impact: 0.05
  rule_update: 0.1

r2dreamer:
  lambd: 5e-4

phase1a:
  goal_horizon: 3

phase2:
  m_obj_threshold: 0.2
  match_margin_threshold: 0.02
  warmup_updates: 1000

structured_readout:
  layers: 2
  hidden: ${model.units}
  map_slots: 16
  map_dim: 32
  obj_slots: 8
  obj_dim: 32
  global_dim: 64
  rule_dim: 64
  query_track_blend: 0.5
  query_track_stopgrad: True

effect_model:
  layers: 2
  hidden: ${model.units}
  latent_dim: ${model.units}

effect_heads:
  layers: 1
  hidden: ${model.units}

reachability_head:
  layers: 1
  hidden: ${model.units}

goal_progress_head:
  layers: 1
  hidden: ${model.units}

objectification:
  match_dim: ${model.units}
  relation_dim: ${model.units}
  num_motifs: 8
  temperature: 0.5
  identity_temperature: 0.25
  ema_decay: 0.99
  sinkhorn_iters: 10
  curriculum_updates: 10000
  obj_stable_early: 0.50
  obj_local_early: 0.15
  obj_rel_early: 0.10
  w_match: 1.0
  w_temp: 1.0
  w_smooth: 0.5
  w_cycle: 0.5
  w_contrast: 0.5
  w_sparse: 1.0
  w_conc: 1.0
  w_cf: 0.5
  w_pair: 1.0
  w_motif: 1.0
  w_reuse: 0.5

operator_bank:
  layers: 2
  hidden: ${model.units}
  num_operators: 8
  operator_dim: ${model.units}
  temperature: 0.5

binding_head:
  layers: 1
  hidden: ${model.units}
  num_bindings: 5

signature_head:
  layers: 1
  hidden: ${model.units}

rule_update:
  layers: 1
  hidden: ${model.units}

dreamer_pro:
  warm_up: 1
  num_prototypes: 2500
  proto_dim: 32
  temperature: 0.1
  sinkhorn_eps: 0.05
  sinkhorn_iters: 3
  ema_update_every: 1
  ema_update_fraction: 0.05
  freeze_prototypes_iters: 10000
  aug:
    max_delta: 3.0
    same_across_time: True
    bilinear: True

rssm:
  stoch: 32
  deter: ${model.deter}
  hidden: ${model.hidden}
  discrete: ${model.discrete}
  img_layers: 2
  obs_layers: 1
  dyn_layers: 1
  blocks: 8
  act: ${model.act}
  norm: ${model.norm}
  unimix_ratio: 0.01
  initial: 'learned'
  device: ${device}

encoder:
  mlp_keys: ${env.encoder.mlp_keys}
  cnn_keys: ${env.encoder.cnn_keys}
  arc3_grid_keys: '^$'
  arc3_grid:
    num_colors: 16
    token_dim: ${model.depth}
    depth: ${model.depth}
    mults: [2, 3, 4, 4]
    act: ${model.act}
    norm: ${model.norm}
    kernel_size: 3
  mlp:
    shape: null
    layers: 3
    units: ${model.units}
    act: ${model.act}
    norm: ${model.norm}
    device: ${device}
    outscale: null
    symlog_inputs: True
    name: 'mlp_encoder'
  cnn:
    act: ${model.act}
    norm: ${model.norm}
    kernel_size: 5
    minres: 4
    depth: ${model.depth}
    mults: [2, 3, 4, 4]

decoder:
  mlp_keys: ${env.decoder.mlp_keys}
  cnn_keys: ${env.decoder.cnn_keys}
  mlp_dist:
    name: 'symlog_mse'
  cnn_dist:
    name: 'mse'
  mlp:
    shape: null
    layers: 3
    units: ${model.units}
    act: ${model.act}
    norm: ${model.norm}
    dist:
      name: 'identity'
    device: ${device}
    outscale: 1.0
    symlog_inputs: False
    name: 'mlp_decoder'
  cnn:
    depth: ${model.depth}
    units: ${model.units}
    bspace: 8
    mults: [2, 3, 4, 4]
    act: ${model.act}
    norm: ${model.norm}
    kernel_size: 5
    minres: 4
    outscale: 1.0

reward:
  shape: [255,]
  layers: 1
  units: ${model.units}
  act: ${model.act}
  norm: ${model.norm}
  dist:
    name: 'symexp_twohot'
    bin_num: 255
  outscale: 0.0
  device: ${device}
  symlog_inputs: False
  name: 'reward'

cont:
  shape: [1,]
  layers: 1
  units: ${model.units}
  act: ${model.act}
  norm: ${model.norm}
  dist:
    name: 'binary'
  outscale: 1.0
  device: ${device}
  symlog_inputs: False
  name: 'cont'

actor:
  shape: null
  layers: 3
  units: ${model.units}
  act: ${model.act}
  norm: ${model.norm}
  device: ${device}
  dist:
    cont:
      name: 'bounded_normal'
      min_std: 0.1
      max_std: 1.0
    disc:
      name: 'onehot'
      unimix_ratio: 0.01
    multi_disc:
      name: 'multi_onehot'
      unimix_ratio: 0.01
  outscale: 0.01
  symlog_inputs: False
  name: 'actor'

critic:
  shape: [255,]
  layers: 3
  units: ${model.units}
  act: ${model.act}
  norm: ${model.norm}
  device: ${device}
  dist:
    name: 'symexp_twohot'
    bin_num: 255
  outscale: 0.0
  symlog_inputs: False
  name: 'value'
